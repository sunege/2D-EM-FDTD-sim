<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2D 電磁場シミュレータ</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #0b0b10;
        color: #e6e6f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: stretch;
      }
      #toolbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        padding: 8px 12px;
        background: #12121c;
        border-bottom: 1px solid #2a2a3a;
        font-size: 13px;
      }
      #toolbar h1 {
        font-size: 14px;
        font-weight: 500;
        opacity: 0.75;
        margin: 0;
        white-space: nowrap;
        margin-right: 4px;
      }
      .sep {
        width: 1px;
        height: 22px;
        background: #2a2a3a;
        flex-shrink: 0;
      }
      .wrap-break {
        flex-basis: 100%;
        height: 0;
      }
      .group {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      button {
        background: #2a2a3a;
        color: #e6e6f0;
        border: 1px solid #3a3a4a;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
      }
      button:hover { background: #3a3a4a; }
      button.active {
        background: #2a3a5a;
        border-color: #4a6aaa;
        color: #aaccff;
      }
      button:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      input[type="range"]:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      input[type="range"] { width: 110px; }
      label { user-select: none; }
      #main {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 16px;
        flex: 1;
      }
      #stage {
        position: relative;
        display: inline-block;
        background: #000;
        border: 1px solid #2a2a3a;
        touch-action: none;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
      }
      #phi-canvas {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        image-rendering: auto;
        touch-action: none;
      }
      .hint {
        margin-top: 10px;
        font-size: 12px;
        opacity: 0.55;
        max-width: 640px;
        line-height: 1.5;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <h1>2D 電磁場シミュレータ</h1>
      <div class="sep"></div>
      <div class="group">
        <button id="pause">一時停止</button>
        <button id="reset">リセット</button>
      </div>
      <div class="sep"></div>
      <div class="group">
        <label for="charge">電荷量</label>
        <input type="range" id="charge" min="-10" max="10" step="0.5" value="5" />
        <span id="chargeVal">+5.0</span>
      </div>
      <div class="sep"></div>
      <div class="group">
        <label for="speed">再生速度</label>
        <input type="range" id="speed" min="0.25" max="4" step="0.25" value="1" />
        <span id="speedVal">×1.00</span>
      </div>
      <div class="sep"></div>
      <div class="group">
        <label><input type="checkbox" id="showStatic" checked /> 静電場</label>
        <label><input type="checkbox" id="showWave" checked /> 放射場</label>
        <label><input type="checkbox" id="highpass" checked /> 残留除去</label>
      </div>
      <div class="wrap-break"></div>
      <div class="group">
        <label>モード</label>
        <button id="modeCharge" class="active">電荷</button>
        <button id="modeConductor">導体</button>
        <button id="modeDielectric">誘電体</button>
        <button id="modeErase">削除</button>
      </div>
      <div class="sep"></div>
      <div class="group">
        <label>形状</label>
        <button id="shapeRect" class="active">矩形</button>
        <button id="shapeDisk">円</button>
        <button id="shapeAnnulus">ドーナツ</button>
      </div>
      <div class="sep"></div>
      <div class="group">
        <label for="sigma">σ</label>
        <input type="range" id="sigma" min="0.05" max="5" step="0.05" value="0.5" />
        <span id="sigmaVal">0.50</span>
      </div>
      <div class="sep"></div>
      <div class="group">
        <label for="epsr">εr</label>
        <input type="range" id="epsr" min="1.0" max="4.0" step="0.1" value="2.0" />
        <span id="epsrVal">2.0</span>
      </div>
      <div class="sep"></div>
      <div class="group">
        <button id="phi3dBtn">電位 3D</button>
        <button id="phi3dResetBtn" style="display:none">ビューリセット</button>
      </div>
    </div>
    <div id="main">
      <div id="stage">
        <canvas id="canvas"></canvas>
        <canvas id="phi-canvas"></canvas>
      </div>
      <p class="hint">
        既存への操作はモード非依存: 電荷クリック→ドラッグ移動 / 導体クリック→接地↔浮遊切替。
        空白部はモードで配置: 電荷=クリック / 導体・誘電体=形状（矩形/円/ドーナツ）をドラッグでサイズ指定 / 削除=クリックで粒子・導体・誘電体を消去。
        導体の色は σ で変化（茶=低σ → 灰=高σ）、接地導体には ⏚ の回路記号。誘電体は青tint。
        Space: 一時停止 / R: 全リセット
      </p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
