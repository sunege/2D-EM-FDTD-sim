<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2D 電磁場シミュレータ</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #0b0b10;
        color: #e6e6f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: stretch;
      }
      #toolbar {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        padding: 8px 12px;
        background: #12121c;
        border-bottom: 1px solid #2a2a3a;
        font-size: 13px;
      }
      #toolbar h1 {
        font-size: 14px;
        font-weight: 500;
        opacity: 0.75;
        margin: 0;
        white-space: nowrap;
        margin-right: 4px;
      }
      .sep {
        width: 1px;
        height: 22px;
        background: #2a2a3a;
        flex-shrink: 0;
      }
      .wrap-break {
        flex-basis: 100%;
        height: 0;
      }
      .group {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      button {
        background: #2a2a3a;
        color: #e6e6f0;
        border: 1px solid #3a3a4a;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
      }
      button:hover { background: #3a3a4a; }
      button.active {
        background: #2a3a5a;
        border-color: #4a6aaa;
        color: #aaccff;
      }
      button:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }
      input[type="range"]:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      input[type="range"] { width: 110px; }
      select {
        background: #2a2a3a;
        color: #e6e6f0;
        border: 1px solid #3a3a4a;
        padding: 4px 8px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        font-family: inherit;
      }
      select:hover { background: #3a3a4a; }
      label { user-select: none; }
      #main {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 16px;
        flex: 1;
      }
      #stage {
        position: relative;
        display: inline-block;
        background: #000;
        border: 1px solid #2a2a3a;
        touch-action: none;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
      }
      #phi-canvas {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        image-rendering: auto;
        touch-action: none;
      }
      .hint {
        margin-top: 10px;
        font-size: 12px;
        opacity: 0.55;
        max-width: 640px;
        line-height: 1.5;
        text-align: center;
      }
      #paramPanel {
        position: fixed;
        right: 16px;
        top: 96px;
        width: 260px;
        max-height: calc(100vh - 120px);
        overflow-y: auto;
        background: #1a1a26;
        border: 1px solid #3a3a5a;
        border-radius: 6px;
        padding: 8px 12px 10px;
        z-index: 20;
        box-shadow: 0 6px 20px rgba(0,0,0,0.45);
        font-size: 13px;
      }
      #paramPanel .pp-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        padding-bottom: 6px;
        border-bottom: 1px solid #2a2a3a;
      }
      #paramPanel .pp-title { font-weight: 600; }
      #paramPanel .pp-close {
        background: transparent;
        border: none;
        color: #aab;
        font-size: 18px;
        line-height: 1;
        padding: 0 6px;
        cursor: pointer;
      }
      #paramPanel .pp-close:hover { color: #fff; background: transparent; }
      #paramPanel .pp-row {
        display: flex;
        align-items: center;
        gap: 6px;
        margin: 6px 0;
      }
      #paramPanel .pp-row > label {
        flex-shrink: 0;
        min-width: 28px;
        opacity: 0.85;
      }
      #paramPanel .pp-row input[type="range"] {
        flex: 1;
        width: auto;
      }
      #paramPanel .pp-row .pp-val {
        flex-shrink: 0;
        min-width: 48px;
        text-align: right;
        opacity: 0.85;
        font-variant-numeric: tabular-nums;
      }
      #paramPanel .pp-row button {
        flex: 1;
        padding: 4px 8px;
      }
      #paramPanel .pp-row-check > label {
        min-width: 0;
        cursor: pointer;
      }
      #paramPanel .pp-row-info > span {
        opacity: 0.7;
        font-size: 12px;
      }
      #chartPanel {
        position: fixed;
        left: 16px;
        top: 96px;
        width: 256px;
        max-height: calc(100vh - 120px);
        overflow-y: auto;
        background: #1a1a26;
        border: 1px solid #3a3a5a;
        border-radius: 6px;
        padding: 6px 0 4px;
        z-index: 20;
        box-shadow: 0 6px 20px rgba(0,0,0,0.45);
        font-size: 13px;
        display: none;
      }
      .cp-row {
        padding: 4px 8px 6px;
        border-bottom: 1px solid #2a2a3a;
      }
      .cp-row:last-child { border-bottom: none; }
      .cp-header {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-bottom: 4px;
      }
      .cp-label {
        font-weight: 700;
        font-size: 12px;
        flex-shrink: 0;
      }
      .cp-coord {
        flex: 1;
        font-size: 11px;
        opacity: 0.55;
        font-variant-numeric: tabular-nums;
      }
      .cp-close {
        background: transparent;
        border: none;
        color: #778;
        font-size: 15px;
        line-height: 1;
        padding: 0 2px;
        cursor: pointer;
        flex-shrink: 0;
      }
      .cp-close:hover { color: #fff; background: transparent; }
      .cp-chips {
        display: flex;
        gap: 3px;
        flex-wrap: wrap;
        margin-bottom: 4px;
      }
      .cp-chip {
        background: #1e1e2e;
        border: 1px solid #3a3a4a;
        color: #556;
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 3px;
        cursor: pointer;
        line-height: 1.5;
      }
      .cp-chip:hover { border-color: #5a5a7a; color: #aab; }
      .cp-chip.active { background: #12121e; border-color: currentColor; }
      .cp-canvas {
        display: block;
        width: 100%;
        image-rendering: auto;
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <h1>2D 電磁場シミュレータ</h1>
      <div class="sep"></div>
      <div class="group">
        <button id="pause">一時停止</button>
        <button id="reset">リセット</button>
      </div>
      <div class="sep"></div>
      <div class="group">
        <label for="charge">電荷量</label>
        <input type="range" id="charge" min="-10" max="10" step="0.5" value="5" />
        <span id="chargeVal">+5.0</span>
      </div>
      <div class="sep"></div>
      <div class="group">
        <label for="speed">再生速度</label>
        <input type="range" id="speed" min="0.25" max="4" step="0.25" value="1" />
        <span id="speedVal">×1.00</span>
      </div>
      <div class="sep"></div>
      <div class="group">
        <label><input type="checkbox" id="showStatic" checked /> 静電場</label>
        <label><input type="checkbox" id="showWave" checked /> 放射場</label>
        <label><input type="checkbox" id="highpass" checked /> 残留除去</label>
      </div>
      <div class="wrap-break"></div>
      <div class="group">
        <label>モード</label>
        <button id="modeCharge" class="active">電荷</button>
        <button id="modeBody">帯電体</button>
        <button id="modeConductor">導体</button>
        <button id="modeDielectric">誘電体</button>
        <button id="modeProbe">プローブ</button>
        <button id="modeErase">削除</button>
      </div>
      <div class="sep"></div>
      <div class="group">
        <label>形状</label>
        <button id="shapeRect" class="active">矩形</button>
        <button id="shapeDisk">円</button>
        <button id="shapeAnnulus">ドーナツ</button>
      </div>
      <div class="sep"></div>
      <div class="group">
        <label><input type="checkbox" id="showEquipot" /> 等電位線</label>
      </div>
      <div class="sep"></div>
      <div class="group">
        <button id="phi3dBtn">電位 3D</button>
        <button id="phi3dResetBtn" style="display:none">3Dビューリセット</button>
        <button id="view2dResetBtn">2Dビューリセット</button>
      </div>
      <div class="sep"></div>
      <div class="group">
        <select id="presetSelect"></select>
        <button id="saveBtn">保存</button>
        <button id="loadBtn">読込</button>
        <input type="file" id="loadFile" accept="application/json,.json" style="display:none" />
      </div>
    </div>
    <div id="main">
      <div id="stage">
        <canvas id="canvas"></canvas>
        <canvas id="phi-canvas"></canvas>
      </div>
      <p class="hint">
        既存への操作はモード非依存: 電荷/帯電体クリック→ドラッグ移動 / 導体クリック→接地↔浮遊切替 / 右クリック→パラメータパネル / プローブクリック→グラフ表示切替・右クリック→削除。
        空白部はモードで配置: 電荷=クリック / 帯電体・導体・誘電体=形状（矩形/円/ドーナツ）をドラッグでサイズ指定 / プローブ=クリックで配置 / 削除=クリックで対象を消去。
        電荷・帯電体は振動 ON で正弦振動（ダイポール放射、振動体は固定）。
        Space: 一時停止 / R: 全リセット
      </p>
    </div>
    <div id="chartPanel"></div>
    <div id="paramPanel"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
