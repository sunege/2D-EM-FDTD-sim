<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2D 電磁場シミュレータ</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #0b0b10;
        color: #e6e6f0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: stretch;
      }
      #toolbar {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        padding: 8px 12px;
        background: #12121c;
        border-bottom: 1px solid #2a2a3a;
        font-size: 13px;
      }
      #toolbar h1 {
        font-size: 14px;
        font-weight: 500;
        opacity: 0.75;
        margin: 0;
        white-space: nowrap;
        margin-right: 4px;
      }
      .sep {
        width: 1px;
        height: 22px;
        background: #2a2a3a;
        flex-shrink: 0;
      }
      .group {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      button {
        background: #2a2a3a;
        color: #e6e6f0;
        border: 1px solid #3a3a4a;
        padding: 4px 10px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
      }
      button:hover { background: #3a3a4a; }
      button.active {
        background: #2a3a5a;
        border-color: #4a6aaa;
        color: #aaccff;
      }
      input[type="range"] { width: 110px; }
      label { user-select: none; }
      #main {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 16px;
        flex: 1;
      }
      #stage {
        position: relative;
        display: inline-block;
        background: #000;
        border: 1px solid #2a2a3a;
        touch-action: none;
      }
      canvas {
        display: block;
        image-rendering: pixelated;
      }
      #phi-canvas {
        display: none;
        position: absolute;
        top: 0;
        left: 0;
        image-rendering: auto;
        touch-action: none;
      }
      .hint {
        margin-top: 10px;
        font-size: 12px;
        opacity: 0.55;
        max-width: 640px;
        line-height: 1.5;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <h1>2D 電磁場シミュレータ</h1>
      <div class="sep"></div>
      <div class="group">
        <button id="pause">一時停止</button>
        <button id="reset">リセット</button>
      </div>
      <div class="sep"></div>
      <div class="group">
        <label for="charge">電荷量</label>
        <input type="range" id="charge" min="-10" max="10" step="0.5" value="5" />
        <span id="chargeVal">+5.0</span>
      </div>
      <div class="sep"></div>
      <div class="group">
        <label for="speed">再生速度</label>
        <input type="range" id="speed" min="0.25" max="4" step="0.25" value="1" />
        <span id="speedVal">×1.00</span>
      </div>
      <div class="sep"></div>
      <div class="group">
        <label><input type="checkbox" id="showStatic" checked /> 静電場</label>
        <label><input type="checkbox" id="showWave" checked /> 放射場</label>
        <label><input type="checkbox" id="highpass" checked /> 残留除去</label>
      </div>
      <div class="sep"></div>
      <div class="group">
        <label>ツール</label>
        <button id="toolCharge" class="active">電荷</button>
        <button id="toolDisk">円盤</button>
        <button id="toolAnnulus">ドーナツ</button>
        <button id="toolRect">矩形</button>
      </div>
      <div class="sep"></div>
      <div class="group">
        <label for="sigma">σ</label>
        <input type="range" id="sigma" min="0.05" max="5" step="0.05" value="0.5" />
        <span id="sigmaVal">0.50</span>
      </div>
      <div class="sep"></div>
      <div class="group">
        <button id="phi3dBtn">電位 3D</button>
        <button id="phi3dResetBtn" style="display:none">ビューリセット</button>
      </div>
    </div>
    <div id="main">
      <div id="stage">
        <canvas id="canvas"></canvas>
        <canvas id="phi-canvas"></canvas>
      </div>
      <p class="hint">
        電荷モード: 左クリックで配置 / 右クリックで逆符号 / ドラッグで移動（急加速で放射波）。
        導体モード（円盤・ドーナツ・矩形）: 空白部からドラッグでサイズ指定。既存導体をクリックすると 接地↔浮遊 切替（青灰=接地, 茶=浮遊）。σ で導電率を調整。
        Space: 一時停止 / R: リセット
      </p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
